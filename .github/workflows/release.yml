name: release

# Build a Windows release on tag push (e.g. v0.2.0): builds the UI, the GUI
# binary, downloads xray.exe, packages a zip and attaches it to a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      XRAY_VERSION: v1.8.24
      XRAY_ZIP: Xray-windows-64.zip
      SINGBOX_VERSION: "1.11.15"
      WINTUN_VERSION: "0.14.1"
      GOOS: windows
      GOARCH: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build UI
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify (vet + test)
        run: |
          go vet ./...
          go test ./...

      - name: Build GUI binary
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          go build -ldflags "-s -w -H windowsgui" -o bin/vpnclient.exe ./cmd/vpnclient
        shell: pwsh

      - name: Download xray.exe
        run: |
          $url = "https://github.com/XTLS/Xray-core/releases/download/$env:XRAY_VERSION/$env:XRAY_ZIP"
          Write-Host "Downloading $url"
          $tmp = Join-Path $env:RUNNER_TEMP $env:XRAY_ZIP
          Invoke-WebRequest -Uri $url -OutFile $tmp
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $dest = Join-Path (Get-Location) 'bin'
          $archive = [System.IO.Compression.ZipFile]::OpenRead($tmp)
          foreach ($e in $archive.Entries) {
            if ($e.Name -eq 'xray.exe') {
              [System.IO.Compression.ZipFileExtensions]::ExtractToFile($e, (Join-Path $dest 'xray.exe'), $true)
            }
          }
          $archive.Dispose()
          if (-not (Test-Path (Join-Path $dest 'xray.exe'))) { throw "xray.exe not found in archive" }
        shell: pwsh

      - name: Download sing-box.exe (TUN engine)
        run: |
          $zip = "sing-box-$env:SINGBOX_VERSION-windows-amd64.zip"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$env:SINGBOX_VERSION/$zip"
          Write-Host "Downloading $url"
          $tmp = Join-Path $env:RUNNER_TEMP $zip
          Invoke-WebRequest -Uri $url -OutFile $tmp
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $dest = Join-Path (Get-Location) 'bin'
          $archive = [System.IO.Compression.ZipFile]::OpenRead($tmp)
          foreach ($e in $archive.Entries) {
            if ($e.Name -eq 'sing-box.exe') {
              [System.IO.Compression.ZipFileExtensions]::ExtractToFile($e, (Join-Path $dest 'sing-box.exe'), $true)
            }
          }
          $archive.Dispose()
          if (-not (Test-Path (Join-Path $dest 'sing-box.exe'))) { throw "sing-box.exe not found in archive" }
        shell: pwsh

      - name: Download wintun.dll
        run: |
          $zip = "wintun-$env:WINTUN_VERSION.zip"
          $url = "https://www.wintun.net/builds/$zip"
          Write-Host "Downloading $url"
          $tmp = Join-Path $env:RUNNER_TEMP $zip
          Invoke-WebRequest -Uri $url -OutFile $tmp
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $dest = Join-Path (Get-Location) 'bin'
          $archive = [System.IO.Compression.ZipFile]::OpenRead($tmp)
          foreach ($e in $archive.Entries) {
            if ($e.FullName -eq 'wintun/bin/amd64/wintun.dll') {
              [System.IO.Compression.ZipFileExtensions]::ExtractToFile($e, (Join-Path $dest 'wintun.dll'), $true)
            }
          }
          $archive.Dispose()
          if (-not (Test-Path (Join-Path $dest 'wintun.dll'))) { throw "wintun.dll not found in archive" }
        shell: pwsh

      - name: Download geo databases
        run: |
          $dest = Join-Path (Get-Location) 'bin/geo'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $files = @{
            'geoip.dat'      = 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat'
            'geosite.dat'    = 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat'
            'geoip-ru.srs'   = 'https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip-ru.srs'
            'geosite-ru.srs' = 'https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite-ru.srs'
          }
          foreach ($k in $files.Keys) {
            Write-Host "Downloading $($files[$k])"
            Invoke-WebRequest -Uri $files[$k] -OutFile (Join-Path $dest $k)
          }
        shell: pwsh

      - name: Assemble staging payload
        run: |
          $stage = Join-Path 'dist' 'stage'
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item 'bin/vpnclient.exe' $stage -Force
          Copy-Item 'bin/xray.exe' $stage -Force
          Copy-Item 'bin/sing-box.exe' $stage -Force
          Copy-Item 'bin/wintun.dll' $stage -Force
          Copy-Item 'docs/RELEASE_README.md' (Join-Path $stage 'README.md') -Force
          New-Item -ItemType Directory -Force -Path (Join-Path $stage 'ui') | Out-Null
          Copy-Item 'frontend/dist/*' (Join-Path $stage 'ui') -Recurse -Force
          New-Item -ItemType Directory -Force -Path (Join-Path $stage 'geo') | Out-Null
          Copy-Item 'bin/geo/*' (Join-Path $stage 'geo') -Recurse -Force
        shell: pwsh

      - name: Package zip
        id: package
        run: |
          $ver = "${{ github.ref_name }}"
          $stage = Join-Path 'dist' 'stage'
          $zip = "vpnclient-$ver-windows-amd64.zip"
          $zipPath = Join-Path 'dist' $zip
          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath $zipPath -Force
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Packaged $zipPath"
        shell: pwsh

      - name: Build installer (Inno Setup)
        id: installer
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          # Inno Setup ships preinstalled on windows-latest runners as ISCC.exe.
          $iscc = "$env:ProgramFiles (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y
            $iscc = "$env:ProgramFiles (x86)\Inno Setup 6\ISCC.exe"
          }
          & $iscc "installer\vpnclient.iss" "/DMyAppVersion=$ver"
          if ($LASTEXITCODE -ne 0) { throw "iscc failed ($LASTEXITCODE)" }
          $setup = Join-Path 'dist' 'SAPN-VPN-Setup.exe'
          if (-not (Test-Path $setup)) { throw "installer not produced" }
          "setup_path=$setup" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Built $setup"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.installer.outputs.setup_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
